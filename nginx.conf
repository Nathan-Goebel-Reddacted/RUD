server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker and manifest — never cache
    location ~* ^/(sw\.js|registerSW\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite hashed assets — immutable cache 1 year
    location ~* \.(?:js|css|woff2?|svg|png|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing — index.html must not be cached
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
